<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MLT SmartServe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* 🌄 BACKGROUND IMAGE */
        background: 
            linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
            url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092');

        background-size: cover;
        background-position: center;
        font-family: 'Poppins', sans-serif;
        color: white;
    }

    .container {
        text-align: center;
    }

    /* 🟡 LIGHT GLOW LOGO */
    .logo-circle {
        width: 150px;
        height: 150px;
        border-radius: 50%;

        background: radial-gradient(circle, #fff6d6, #f5f5dc);

        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 25px auto;

        box-shadow: 
            0 0 20px rgba(255, 220, 150, 0.4),
            0 0 40px rgba(255, 200, 120, 0.2);
    }

    /* 🔴 MLT TEXT GLOW */
    .logo-text {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: 3px;
        color: #ff3c00;

        text-shadow: 
            0 0 8px rgba(255, 60, 0, 0.6),
            0 0 15px rgba(255, 60, 0, 0.4),
            0 0 25px rgba(255, 60, 0, 0.2);
    }

    /* 🌍 BUTTON STYLE */
    .language-btn {
        display: block;
        width: 220px;
        margin: 12px auto;
        padding: 14px;
        border-radius: 50px;
        border: none;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        color: white;

        background: rgba(255, 60, 0, 0.15);
        border: 1px solid #ff3c00;
        transition: 0.3s;
        backdrop-filter: blur(6px);
    }

    .language-btn:hover {
        background: #ff3c00;
        transform: scale(1.05);
        box-shadow: 0 0 20px #ff3c00;
    }

    .kurdish {
        font-family: 'Cairo', sans-serif;
    }
</style>
</head>

<body>

<div class="container">

    <!-- 🟡 LOGO -->
    <div class="logo-circle">
        <div class="logo-text">MLT</div>
    </div>

    <!-- 🌍 LANGUAGE BUTTONS -->
   <button class="language-btn" onclick="window.location.href='menuE.html'">English</button>
    <button class="language-btn kurdish" onclick="window.location.href='menuK.html'">کوردی</button>

</div>

<script>
    function selectLanguage(lang) {
        localStorage.setItem("language", lang);
        alert("Language selected: " + lang);
    }
</script>

</body>
</html>
